packages:
  - 'packages/*'

# Force patched versions of transitive dependencies flagged by `pnpm audit`.
# All entries are nested deps (Nx / MCP SDK / esbuild toolchain) with no direct
# import here — bump them via overrides until upstream releases catch up.
overrides:
  fast-uri: '>=3.1.2'
  '@babel/plugin-transform-modules-systemjs': '>=7.29.4'
  tmp: '>=0.2.6'
  yaml: '>=2.8.3'
  hono: '>=4.12.18'
  ip-address: '>=10.1.1'
  brace-expansion: '>=5.0.6'
  ws: '>=8.20.1'
  qs: '>=6.15.2'

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  nx: true

supportedArchitectures:
  os:
    - current
  cpu:
    - x64
    - arm64
