<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js 3D City — Workshop Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0d14;
        color: #e8eaf0;
        font-family:
          "Inter",
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        font-weight: 300;
        letter-spacing: 0.01em;
      }

      #stage {
        position: fixed;
        inset: 0;
      }
      #stage canvas {
        display: block;
      }

      .panel {
        position: fixed;
        top: 24px;
        left: 24px;
        width: 280px;
        padding: 22px 20px;
        background: rgba(14, 17, 24, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 16px;
        z-index: 10;
      }
      .panel h1 {
        margin: 0 0 4px;
        font-size: 15px;
        font-weight: 400;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .panel p.lead {
        margin: 0 0 20px;
        font-size: 12px;
        color: #8b93a4;
        letter-spacing: 0.04em;
        line-height: 1.5;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        font-size: 12px;
        color: #c0c6d2;
        letter-spacing: 0.06em;
      }
      .row .label {
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #8b93a4;
        font-size: 11px;
      }
      .row .value {
        color: #e8eaf0;
        font-variant-numeric: tabular-nums;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #6ea8ff;
        margin: 4px 0 14px;
      }

      .toggles {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 6px;
      }
      button.tog {
        appearance: none;
        padding: 10px 12px;
        background: transparent;
        color: #c0c6d2;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s;
      }
      button.tog.active {
        background: #e8eaf0;
        color: #0a0d14;
        border-color: #e8eaf0;
      }
      button.tog:hover:not(.active) {
        border-color: rgba(255, 255, 255, 0.3);
        color: #e8eaf0;
      }

      .swatches {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }
      .swatch {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        outline: 1px solid rgba(255, 255, 255, 0.2);
      }
      .swatch.active {
        border-color: #e8eaf0;
      }

      .hint {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #6b7180;
        pointer-events: none;
      }
      .hint span {
        color: #c0c6d2;
      }
    </style>
  </head>
  <body>
    <div id="stage"></div>

    <div class="panel">
      <h1>Nordic Grid</h1>
      <p class="lead">
        워크숍 데모 · Three.js 기본 지오메트리만으로 만든 3D 도시
      </p>

      <div class="row">
        <span class="label">Buildings</span>
        <span class="value" id="buildingsLabel">120</span>
      </div>
      <input
        type="range"
        id="buildings"
        min="20"
        max="240"
        step="10"
        value="120"
      />

      <div class="row">
        <span class="label">Max Height</span>
        <span class="value" id="heightLabel">12</span>
      </div>
      <input
        type="range"
        id="height"
        min="4"
        max="30"
        step="1"
        value="12"
      />

      <div class="row">
        <span class="label">Density</span>
        <span class="value" id="densityLabel">0.85</span>
      </div>
      <input
        type="range"
        id="density"
        min="0.3"
        max="1"
        step="0.05"
        value="0.85"
      />

      <div class="row" style="margin-top: 8px">
        <span class="label">Mood</span>
      </div>
      <div class="toggles">
        <button class="tog active" data-mood="night">Night</button>
        <button class="tog" data-mood="day">Day</button>
      </div>

      <div class="row" style="margin-top: 16px">
        <span class="label">Accent</span>
      </div>
      <div class="swatches" id="accents">
        <div
          class="swatch active"
          data-accent="#6ea8ff"
          style="background: #6ea8ff"
        ></div>
        <div
          class="swatch"
          data-accent="#ffb26a"
          style="background: #ffb26a"
        ></div>
        <div
          class="swatch"
          data-accent="#b893ff"
          style="background: #b893ff"
        ></div>
        <div
          class="swatch"
          data-accent="#7dffd4"
          style="background: #7dffd4"
        ></div>
      </div>

      <div class="row" style="margin-top: 18px">
        <span class="label">Kaiju</span>
      </div>
      <div class="toggles">
        <button class="tog active" data-kaiju="off">Off</button>
        <button class="tog" data-kaiju="on">On</button>
      </div>
    </div>

    <div class="hint">
      <span>Drag</span> to orbit · <span>Scroll</span> to zoom ·
      <span>Right-drag</span> to pan
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const stage = document.getElementById("stage");
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      stage.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        42,
        window.innerWidth / window.innerHeight,
        0.1,
        2000,
      );
      camera.position.set(70, 60, 90);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.maxPolarAngle = Math.PI * 0.48;
      controls.minDistance = 30;
      controls.maxDistance = 260;
      controls.target.set(0, 2, 0);

      const config = {
        count: 120,
        maxHeight: 12,
        density: 0.85,
        mood: "night",
        accent: new THREE.Color("#6ea8ff"),
      };

      const moods = {
        night: {
          bg: new THREE.Color("#121829"),
          fog: new THREE.Color("#121829"),
          ambient: 0.75,
          sun: 0.7,
          sunColor: new THREE.Color("#9dc3ff"),
          hemiSky: new THREE.Color("#3f4f78"),
          hemiGround: new THREE.Color("#141826"),
          hemi: 0.95,
          ground: new THREE.Color("#252c3f"),
          buildingA: new THREE.Color("#545d75"),
          buildingB: new THREE.Color("#6c7690"),
          buildingEmissive: new THREE.Color("#222a42"),
          buildingEmissiveIntensity: 0.4,
          windowLit: true,
          moon: 1.2,
          moonOpacity: 1.0,
          moonGlowOpacity: 0.6,
          starsOpacity: 0.75,
        },
        day: {
          bg: new THREE.Color("#cfdce8"),
          fog: new THREE.Color("#d7e1ea"),
          ambient: 0.7,
          sun: 1.3,
          sunColor: new THREE.Color("#fff4e0"),
          hemiSky: new THREE.Color("#dfe8f2"),
          hemiGround: new THREE.Color("#b5beca"),
          hemi: 0.6,
          ground: new THREE.Color("#c5ccd4"),
          buildingA: new THREE.Color("#e7ebf0"),
          buildingB: new THREE.Color("#c0c7d0"),
          buildingEmissive: new THREE.Color("#000000"),
          buildingEmissiveIntensity: 0,
          windowLit: false,
          moon: 0.0,
          moonOpacity: 0.0,
          moonGlowOpacity: 0.0,
          starsOpacity: 0.0,
        },
      };

      const ambient = new THREE.AmbientLight(0xffffff, 0.22);
      scene.add(ambient);

      const hemi = new THREE.HemisphereLight(0x2a3a5c, 0x0b0f18, 0.75);
      scene.add(hemi);

      const sun = new THREE.DirectionalLight(0xffffff, 0.35);
      sun.position.set(40, 70, 30);
      sun.castShadow = true;
      sun.shadow.mapSize.set(1024, 1024);
      sun.shadow.camera.left = -80;
      sun.shadow.camera.right = 80;
      sun.shadow.camera.top = 80;
      sun.shadow.camera.bottom = -80;
      sun.shadow.camera.near = 1;
      sun.shadow.camera.far = 200;
      sun.shadow.bias = -0.0005;
      scene.add(sun);

      const moonLight = new THREE.DirectionalLight(0xbcd4ff, 0.0);
      moonLight.position.set(120, 140, 60);
      scene.add(moonLight);

      const moon = new THREE.Mesh(
        new THREE.SphereGeometry(10, 48, 48),
        new THREE.MeshBasicMaterial({
          color: 0xf4f1e0,
          transparent: true,
          opacity: 0.0,
          fog: false,
        }),
      );
      moon.position.set(140, 120, 60);
      scene.add(moon);

      const moonGlow = new THREE.Mesh(
        new THREE.SphereGeometry(24, 48, 48),
        new THREE.MeshBasicMaterial({
          color: 0xbcd4ff,
          transparent: true,
          opacity: 0.0,
          fog: false,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        }),
      );
      moonGlow.position.copy(moon.position);
      scene.add(moonGlow);

      const moonHalo = new THREE.Mesh(
        new THREE.SphereGeometry(42, 48, 48),
        new THREE.MeshBasicMaterial({
          color: 0x7ea0ff,
          transparent: true,
          opacity: 0.0,
          fog: false,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        }),
      );
      moonHalo.position.copy(moon.position);
      scene.add(moonHalo);

      const skyGeom = new THREE.SphereGeometry(900, 32, 32);
      const skyMat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        fog: false,
        uniforms: {
          uTop: { value: new THREE.Color("#070a16") },
          uMid: { value: new THREE.Color("#131a30") },
          uHorizon: { value: new THREE.Color("#2a2040") },
          uOpacity: { value: 0.0 },
        },
        vertexShader: `
          varying vec3 vWorld;
          void main(){
            vWorld = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform vec3 uTop;
          uniform vec3 uMid;
          uniform vec3 uHorizon;
          uniform float uOpacity;
          varying vec3 vWorld;
          void main(){
            float h = normalize(vWorld).y;
            vec3 col = mix(uHorizon, uMid, smoothstep(-0.05, 0.25, h));
            col = mix(col, uTop, smoothstep(0.25, 0.75, h));
            gl_FragColor = vec4(col, uOpacity);
          }
        `,
        transparent: true,
      });
      const sky = new THREE.Mesh(skyGeom, skyMat);
      scene.add(sky);

      const starCount = 600;
      const starPositions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const r = 600 + Math.random() * 100;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(Math.random() * 0.6 + 0.3);
        starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        starPositions[i * 3 + 1] = r * Math.cos(phi);
        starPositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      }
      const starGeom = new THREE.BufferGeometry();
      starGeom.setAttribute(
        "position",
        new THREE.BufferAttribute(starPositions, 3),
      );
      const stars = new THREE.Points(
        starGeom,
        new THREE.PointsMaterial({
          color: 0xeef4ff,
          size: 1.4,
          sizeAttenuation: true,
          transparent: true,
          opacity: 0.0,
          fog: false,
        }),
      );
      scene.add(stars);

      scene.fog = new THREE.Fog(0x0d1220, 150, 420);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(400, 400),
        new THREE.MeshStandardMaterial({ color: 0x11141c, roughness: 0.95 }),
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      const roads = new THREE.Group();
      const roadMat = new THREE.MeshStandardMaterial({
        color: 0x333a4d,
        roughness: 0.85,
        metalness: 0.0,
      });
      const roadW = 6;
      const mapSize = 180;
      const roadIndices = [-3, -2, -1, 0, 1, 2, 3];
      const roadStep = 24;
      const halfMap = mapSize / 2;
      for (let i = -3; i <= 3; i++) {
        const h = new THREE.Mesh(
          new THREE.PlaneGeometry(mapSize, roadW),
          roadMat,
        );
        h.rotation.x = -Math.PI / 2;
        h.position.set(0, 0.02, i * 24);
        h.receiveShadow = true;
        roads.add(h);

        const v = new THREE.Mesh(
          new THREE.PlaneGeometry(roadW, mapSize),
          roadMat,
        );
        v.rotation.x = -Math.PI / 2;
        v.position.set(i * 24, 0.02, 0);
        v.receiveShadow = true;
        roads.add(v);
      }
      scene.add(roads);

      const stripeMat = new THREE.MeshBasicMaterial({ color: 0xf6d27a });
      for (let i = -3; i <= 3; i++) {
        for (let seg = -7; seg <= 7; seg++) {
          if (Math.abs(seg) % 2 === 0) continue;
          const s1 = new THREE.Mesh(
            new THREE.PlaneGeometry(3, 0.3),
            stripeMat,
          );
          s1.rotation.x = -Math.PI / 2;
          s1.position.set(seg * 12, 0.05, i * 24);
          scene.add(s1);

          const s2 = new THREE.Mesh(
            new THREE.PlaneGeometry(0.3, 3),
            stripeMat,
          );
          s2.rotation.x = -Math.PI / 2;
          s2.position.set(i * 24, 0.05, seg * 12);
          scene.add(s2);
        }
      }

      const curbMat = new THREE.MeshBasicMaterial({ color: 0x5a6578 });
      for (let i = -3; i <= 3; i++) {
        [-roadW / 2, roadW / 2].forEach((off) => {
          const h = new THREE.Mesh(
            new THREE.PlaneGeometry(mapSize, 0.2),
            curbMat,
          );
          h.rotation.x = -Math.PI / 2;
          h.position.set(0, 0.04, i * 24 + off);
          scene.add(h);

          const v = new THREE.Mesh(
            new THREE.PlaneGeometry(0.2, mapSize),
            curbMat,
          );
          v.rotation.x = -Math.PI / 2;
          v.position.set(i * 24 + off, 0.04, 0);
          scene.add(v);
        });
      }

      let city = null;
      let windowsMesh = null;
      let traffic = null;
      let crossings = null;
      let pedestrians = null;
      let kaiju = null;
      const kaijuState = {
        active: false,
        pos: new THREE.Vector3(),
        dir: new THREE.Vector3(1, 0, 0),
        time: 0,
        dyingBuildings: [],
        dusts: [],
        skyLerp: 0,
      };

      function seededRandom(seed) {
        let s = seed >>> 0;
        return () => {
          s = (s * 1664525 + 1013904223) >>> 0;
          return s / 0xffffffff;
        };
      }

      function buildCity() {
        if (city) {
          scene.remove(city);
          city.traverse((o) => {
            if (o.isMesh) {
              o.geometry.dispose();
              if (o.material.map) o.material.map.dispose();
              o.material.dispose();
            }
          });
        }

        city = new THREE.Group();
        const mood = moods[config.mood];

        const boxGeom = new THREE.BoxGeometry(1, 1, 1);
        const matA = new THREE.MeshStandardMaterial({
          color: mood.buildingA,
          roughness: 0.75,
          metalness: 0.1,
          emissive: mood.buildingEmissive,
          emissiveIntensity: mood.buildingEmissiveIntensity,
        });
        const matB = new THREE.MeshStandardMaterial({
          color: mood.buildingB,
          roughness: 0.6,
          metalness: 0.15,
          emissive: mood.buildingEmissive,
          emissiveIntensity: mood.buildingEmissiveIntensity,
        });

        const lots = [];
        const gridStep = 6;
        const gridHalf = 12;
        for (let gx = -gridHalf; gx <= gridHalf; gx++) {
          for (let gz = -gridHalf; gz <= gridHalf; gz++) {
            const x = gx * gridStep;
            const z = gz * gridStep;
            const onRoadX = Math.abs(Math.round(x / 24) * 24 - x) < 4;
            const onRoadZ = Math.abs(Math.round(z / 24) * 24 - z) < 4;
            if (onRoadX || onRoadZ) continue;
            lots.push({ x, z });
          }
        }

        const rng = seededRandom(42);
        const shuffled = lots
          .map((l) => ({ l, r: rng() }))
          .sort((a, b) => a.r - b.r)
          .map((o) => o.l);

        const used = shuffled.slice(
          0,
          Math.min(config.count, shuffled.length),
        );

        const windowGeom = new THREE.PlaneGeometry(0.45, 0.45);
        const litColor = config.accent.clone();
        const windowMat = new THREE.MeshBasicMaterial({
          color: litColor,
          transparent: true,
          opacity: mood.windowLit ? 0.9 : 0.0,
        });
        windowMat.userData.isWindow = true;
        const windowInstances = [];

        used.forEach((lot, idx) => {
          const rngLot = seededRandom(1000 + idx);
          const falloff = rngLot() < config.density ? 1 : 0.35;
          const h = Math.max(
            1.5,
            (0.4 + rngLot() * 0.6) * config.maxHeight * falloff,
          );
          const w = 2.4 + rngLot() * 1.4;
          const d = 2.4 + rngLot() * 1.4;

          const mesh = new THREE.Mesh(boxGeom, rngLot() > 0.5 ? matA : matB);
          mesh.scale.set(w, h, d);
          mesh.position.set(lot.x, h / 2, lot.z);
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          mesh.userData.isBuilding = true;
          mesh.userData.windows = [];
          city.add(mesh);

          if (mood.windowLit && h > 2.5) {
            const rows = Math.floor(h / 1.0);
            const colsX = Math.max(1, Math.floor(w / 0.9));
            const colsZ = Math.max(1, Math.floor(d / 0.9));

            const registerWindow = (win) => {
              win.userData.ownerBuilding = mesh;
              mesh.userData.windows.push(win);
              windowInstances.push(win);
            };

            for (let r = 0; r < rows; r++) {
              for (let c = 0; c < colsX; c++) {
                if (rngLot() > 0.55) continue;
                const y = 0.6 + r * 1.0;
                const xoff = -w / 2 + 0.4 + c * ((w - 0.8) / Math.max(1, colsX - 1 || 1));
                ["north", "south"].forEach((side) => {
                  const win = new THREE.Mesh(windowGeom, windowMat);
                  win.position.set(
                    lot.x + xoff,
                    y,
                    lot.z + (side === "south" ? d / 2 + 0.02 : -d / 2 - 0.02),
                  );
                  if (side === "north") win.rotation.y = Math.PI;
                  registerWindow(win);
                });
              }
              for (let c = 0; c < colsZ; c++) {
                if (rngLot() > 0.55) continue;
                const y = 0.6 + r * 1.0;
                const zoff = -d / 2 + 0.4 + c * ((d - 0.8) / Math.max(1, colsZ - 1 || 1));
                ["east", "west"].forEach((side) => {
                  const win = new THREE.Mesh(windowGeom, windowMat);
                  win.position.set(
                    lot.x + (side === "east" ? w / 2 + 0.02 : -w / 2 - 0.02),
                    y,
                    lot.z + zoff,
                  );
                  win.rotation.y =
                    side === "east" ? Math.PI / 2 : -Math.PI / 2;
                  registerWindow(win);
                });
              }
            }
          }
        });

        windowInstances.forEach((w) => city.add(w));
        windowsMesh = { instances: windowInstances, material: windowMat };

        scene.add(city);
      }

      function applyMood() {
        const mood = moods[config.mood];
        scene.background = mood.bg;
        scene.fog.color.copy(mood.fog);
        ambient.intensity = mood.ambient;
        hemi.color.copy(mood.hemiSky);
        hemi.groundColor.copy(mood.hemiGround);
        hemi.intensity = mood.hemi;
        sun.intensity = mood.sun;
        sun.color.copy(mood.sunColor);
        ground.material.color.copy(mood.ground);
        ground.material.needsUpdate = true;

        if (city) {
          city.traverse((o) => {
            if (!o.isMesh) return;
            const mat = o.material;
            if (!mat || mat.userData?.isWindow) return;
            if (mat.emissive && o.userData?.isBuilding) {
              mat.emissive.copy(mood.buildingEmissive);
              mat.emissiveIntensity = mood.buildingEmissiveIntensity;
              mat.needsUpdate = true;
            }
          });
        }

        if (windowsMesh) {
          windowsMesh.material.opacity = mood.windowLit ? 0.9 : 0.0;
          windowsMesh.material.color.copy(config.accent);
        }

        moonLight.intensity = mood.moon ?? 0;
        moon.material.opacity = mood.moonOpacity ?? 0;
        moon.visible = (mood.moonOpacity ?? 0) > 0;
        moonGlow.material.opacity = mood.moonGlowOpacity ?? 0;
        moonGlow.visible = (mood.moonGlowOpacity ?? 0) > 0;
        moonHalo.material.opacity = (mood.moonGlowOpacity ?? 0) * 0.5;
        moonHalo.visible = (mood.moonGlowOpacity ?? 0) > 0;
        stars.material.opacity = mood.starsOpacity ?? 0;
        stars.visible = (mood.starsOpacity ?? 0) > 0;

        skyMat.uniforms.uOpacity.value = config.mood === "night" ? 1.0 : 0.0;
        sky.visible = config.mood === "night";

        applyTrafficMood();
        applyPedestriansMood();
      }

      const pastelPalette = [
        0xf2a9a9, // blush
        0xf9d39a, // apricot
        0xf6e7a2, // butter
        0xa9d6c2, // mint
        0xa6c9e8, // sky
        0xc6b8e3, // lavender
      ];

      function buildTraffic() {
        if (traffic) {
          scene.remove(traffic);
          traffic.traverse((o) => {
            if (o.isMesh) {
              o.geometry.dispose();
              o.material.dispose();
            }
          });
        }

        traffic = new THREE.Group();
        traffic.userData.cars = [];

        const bodyGeom = new THREE.BoxGeometry(1.8, 0.5, 0.9);
        const roofGeom = new THREE.BoxGeometry(1.0, 0.4, 0.78);
        const headlightGeom = new THREE.SphereGeometry(0.18, 10, 10);

        const laneOffset = 1.4;
        const lanes = [];
        roadIndices.forEach((idx) => {
          const base = idx * roadStep;
          // horizontal road: cars move along X, one lane per direction
          lanes.push({ axis: "x", roadCoord: base - laneOffset, dir: 1 });
          lanes.push({ axis: "x", roadCoord: base + laneOffset, dir: -1 });
          // vertical road: cars move along Z
          lanes.push({ axis: "z", roadCoord: base - laneOffset, dir: 1 });
          lanes.push({ axis: "z", roadCoord: base + laneOffset, dir: -1 });
        });

        const carCount = 30;
        for (let i = 0; i < carCount; i++) {
          const lane = lanes[Math.floor(Math.random() * lanes.length)];
          const color = pastelPalette[i % pastelPalette.length];
          const speed = 3.5 + Math.random() * 3.0;

          const car = new THREE.Group();
          car.userData.lane = lane;
          car.userData.speed = speed;

          const bodyMat = new THREE.MeshStandardMaterial({
            color,
            roughness: 0.55,
            metalness: 0.25,
          });
          const body = new THREE.Mesh(bodyGeom, bodyMat);
          body.position.y = 0.25;
          body.castShadow = true;
          car.add(body);

          const roofMat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(color).multiplyScalar(0.75),
            roughness: 0.5,
            metalness: 0.2,
          });
          const roof = new THREE.Mesh(roofGeom, roofMat);
          roof.position.set(-0.05, 0.65, 0);
          roof.castShadow = true;
          car.add(roof);

          const headlightMat = new THREE.MeshBasicMaterial({
            color: 0xfff2a8,
            transparent: true,
            opacity: 0.0,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
          });
          const hlLeft = new THREE.Mesh(headlightGeom, headlightMat);
          const hlRight = new THREE.Mesh(headlightGeom, headlightMat);
          hlLeft.position.set(0.95, 0.32, 0.32);
          hlRight.position.set(0.95, 0.32, -0.32);
          car.add(hlLeft);
          car.add(hlRight);
          car.userData.headlightMat = headlightMat;

          // place along the lane
          const t = Math.random() * mapSize - halfMap;
          if (lane.axis === "x") {
            car.position.set(t, 0, lane.roadCoord);
            car.rotation.y = lane.dir === 1 ? 0 : Math.PI;
          } else {
            car.position.set(lane.roadCoord, 0, t);
            car.rotation.y = lane.dir === 1 ? -Math.PI / 2 : Math.PI / 2;
          }

          traffic.add(car);
          traffic.userData.cars.push(car);
        }

        scene.add(traffic);
      }

      function updateTraffic(delta) {
        if (!traffic) return;
        traffic.userData.cars.forEach((car) => {
          const { lane, speed } = car.userData;
          if (lane.axis === "x") {
            car.position.x += lane.dir * speed * delta;
            if (lane.dir === 1 && car.position.x > halfMap) {
              car.position.x = -halfMap;
            } else if (lane.dir === -1 && car.position.x < -halfMap) {
              car.position.x = halfMap;
            }
          } else {
            car.position.z += lane.dir * speed * delta;
            if (lane.dir === 1 && car.position.z > halfMap) {
              car.position.z = -halfMap;
            } else if (lane.dir === -1 && car.position.z < -halfMap) {
              car.position.z = halfMap;
            }
          }
        });
      }

      function applyTrafficMood() {
        if (!traffic) return;
        const isNight = config.mood === "night";
        traffic.userData.cars.forEach((car) => {
          car.userData.headlightMat.opacity = isNight ? 0.95 : 0.0;
        });
      }

      const peoplePalette = [
        0xe7c3b4, // peach
        0xbfd4b2, // sage
        0xc5c5e3, // lilac
        0xe9d39d, // wheat
        0xb0c8d4, // dusty blue
        0xd9b6c4, // rosy
      ];

      function buildCrossings() {
        if (crossings) {
          scene.remove(crossings);
          crossings.traverse((o) => {
            if (o.isMesh) {
              o.geometry.dispose();
              o.material.dispose();
            }
          });
        }

        crossings = new THREE.Group();
        const stripeMat = new THREE.MeshBasicMaterial({ color: 0xf3f4f6 });
        const stripeCount = 5;
        const stripeW = 0.5;
        const stripeGap = 0.45;
        const stripeLen = 3.2;
        const offsetFromCenter = roadW / 2 + stripeLen / 2 + 0.15;

        roadIndices.forEach((ix) => {
          roadIndices.forEach((iz) => {
            const cx = ix * roadStep;
            const cz = iz * roadStep;

            // crosswalks on 4 sides of the intersection
            [-1, 1].forEach((sign) => {
              // north/south crosswalks (stripes across the N-S road, cars travel in Z)
              for (let s = 0; s < stripeCount; s++) {
                const stripe = new THREE.Mesh(
                  new THREE.PlaneGeometry(stripeW, stripeLen),
                  stripeMat,
                );
                stripe.rotation.x = -Math.PI / 2;
                const base =
                  -((stripeCount - 1) / 2) * (stripeW + stripeGap);
                stripe.position.set(
                  cx + base + s * (stripeW + stripeGap),
                  0.06,
                  cz + sign * offsetFromCenter,
                );
                crossings.add(stripe);
              }

              // east/west crosswalks (stripes across E-W road)
              for (let s = 0; s < stripeCount; s++) {
                const stripe = new THREE.Mesh(
                  new THREE.PlaneGeometry(stripeLen, stripeW),
                  stripeMat,
                );
                stripe.rotation.x = -Math.PI / 2;
                const base =
                  -((stripeCount - 1) / 2) * (stripeW + stripeGap);
                stripe.position.set(
                  cx + sign * offsetFromCenter,
                  0.06,
                  cz + base + s * (stripeW + stripeGap),
                );
                crossings.add(stripe);
              }
            });
          });
        });

        scene.add(crossings);
      }

      function buildPedestrians() {
        if (pedestrians) {
          scene.remove(pedestrians);
          pedestrians.traverse((o) => {
            if (o.isMesh) {
              o.geometry.dispose();
              o.material.dispose();
            }
          });
        }

        pedestrians = new THREE.Group();
        pedestrians.userData.people = [];

        const bodyGeom = new THREE.BoxGeometry(0.3, 1.2, 0.3);
        const headGeom = new THREE.SphereGeometry(0.18, 10, 10);
        const headColor = 0xf0d6be;

        const sidewalkOffset = roadW / 2 + 0.6;
        const peopleCount = 40;

        for (let i = 0; i < peopleCount; i++) {
          const color = peoplePalette[i % peoplePalette.length];
          const baseSpeed = 1.1 + Math.random() * 0.8;
          const person = new THREE.Group();

          const bodyMat = new THREE.MeshStandardMaterial({
            color,
            roughness: 0.75,
            metalness: 0.0,
            emissive: new THREE.Color(color).multiplyScalar(0.18),
            emissiveIntensity: 0.6,
          });
          const body = new THREE.Mesh(bodyGeom, bodyMat);
          body.position.y = 0.6;
          body.castShadow = true;
          person.add(body);

          const headMat = new THREE.MeshStandardMaterial({
            color: headColor,
            roughness: 0.7,
            metalness: 0.0,
            emissive: new THREE.Color(headColor).multiplyScalar(0.2),
            emissiveIntensity: 0.6,
          });
          const head = new THREE.Mesh(headGeom, headMat);
          head.position.y = 1.35;
          head.castShadow = true;
          person.add(head);

          person.userData = {
            baseSpeed,
            speed: baseSpeed,
            bodyMat,
            headMat,
            mode: "sidewalk",
            axis: Math.random() < 0.5 ? "x" : "z",
            roadIdx:
              roadIndices[Math.floor(Math.random() * roadIndices.length)],
            side: Math.random() < 0.5 ? 1 : -1,
            dir: Math.random() < 0.5 ? 1 : -1,
            crossCooldown: 2 + Math.random() * 4,
          };

          placeOnSidewalk(person, (Math.random() - 0.5) * mapSize * 0.9);
          pedestrians.add(person);
          pedestrians.userData.people.push(person);
        }

        scene.add(pedestrians);
      }

      function placeOnSidewalk(person, along) {
        const sidewalkOffset = roadW / 2 + 0.6;
        const ud = person.userData;
        const sidewalkCoord = ud.roadIdx * roadStep + ud.side * sidewalkOffset;
        if (ud.axis === "x") {
          person.position.set(along, 0, sidewalkCoord);
          person.rotation.y = ud.dir === 1 ? 0 : Math.PI;
        } else {
          person.position.set(sidewalkCoord, 0, along);
          person.rotation.y = ud.dir === 1 ? -Math.PI / 2 : Math.PI / 2;
        }
      }

      function updatePedestrians(delta) {
        if (!pedestrians) return;
        const sidewalkOffset = roadW / 2 + 0.6;
        const minEdge = roadIndices[0] * roadStep;
        const maxEdge = roadIndices[roadIndices.length - 1] * roadStep;

        pedestrians.userData.people.forEach((p) => {
          const ud = p.userData;

          if (ud.mode === "sidewalk") {
            const step = ud.dir * ud.speed * delta;
            if (ud.axis === "x") {
              p.position.x += step;
              if (p.position.x > maxEdge) p.position.x = minEdge;
              if (p.position.x < minEdge) p.position.x = maxEdge;
            } else {
              p.position.z += step;
              if (p.position.z > maxEdge) p.position.z = minEdge;
              if (p.position.z < minEdge) p.position.z = maxEdge;
            }

            ud.crossCooldown -= delta;
            if (ud.crossCooldown > 0) return;

            // Try to cross at the nearest intersection along the walk direction.
            const along = ud.axis === "x" ? p.position.x : p.position.z;
            const nextIntersection =
              Math.round(along / roadStep) * roadStep;
            const distToIntersection = Math.abs(nextIntersection - along);
            if (distToIntersection < 1.2) {
              // Snap to the intersection center and start crossing.
              if (ud.axis === "x") {
                p.position.x = nextIntersection;
              } else {
                p.position.z = nextIntersection;
              }
              ud.mode = "crossing";
              ud.speed = ud.baseSpeed * 1.6;
              ud.nextSide = -ud.side;
              ud.crossTarget =
                ud.roadIdx * roadStep + ud.nextSide * sidewalkOffset;
              if (ud.axis === "x") {
                p.rotation.y =
                  ud.crossTarget > p.position.z ? Math.PI / 2 : -Math.PI / 2;
              } else {
                p.rotation.y =
                  ud.crossTarget > p.position.x ? 0 : Math.PI;
              }
            }
          } else if (ud.mode === "crossing") {
            const step = ud.speed * delta;
            if (ud.axis === "x") {
              const delta2 = ud.crossTarget - p.position.z;
              const move = Math.sign(delta2) * Math.min(step, Math.abs(delta2));
              p.position.z += move;
              if (Math.abs(ud.crossTarget - p.position.z) < 0.01) {
                finishCrossing(p);
              }
            } else {
              const delta2 = ud.crossTarget - p.position.x;
              const move = Math.sign(delta2) * Math.min(step, Math.abs(delta2));
              p.position.x += move;
              if (Math.abs(ud.crossTarget - p.position.x) < 0.01) {
                finishCrossing(p);
              }
            }
          }
        });
      }

      function finishCrossing(person) {
        const ud = person.userData;
        ud.side = ud.nextSide;
        ud.mode = "sidewalk";
        ud.speed = ud.baseSpeed;
        ud.crossCooldown = 3 + Math.random() * 5;
        if (ud.axis === "x") {
          person.rotation.y = ud.dir === 1 ? 0 : Math.PI;
        } else {
          person.rotation.y = ud.dir === 1 ? -Math.PI / 2 : Math.PI / 2;
        }
      }

      function applyPedestriansMood() {
        if (!pedestrians) return;
        const isNight = config.mood === "night";
        pedestrians.userData.people.forEach((p) => {
          p.userData.bodyMat.emissiveIntensity = isNight ? 0.75 : 0.0;
          p.userData.headMat.emissiveIntensity = isNight ? 0.75 : 0.0;
        });
      }

      // ─────────── Kaiju ───────────
      const kaijuSkyNight = {
        uTop: new THREE.Color("#070a16"),
        uMid: new THREE.Color("#131a30"),
        uHorizon: new THREE.Color("#2a2040"),
        bg: new THREE.Color("#121829"),
      };
      const kaijuSkyRed = {
        uTop: new THREE.Color("#2a0e12"),
        uMid: new THREE.Color("#3a1216"),
        uHorizon: new THREE.Color("#5a1a18"),
        bg: new THREE.Color("#2a0e12"),
      };

      function disposeGroup(group) {
        if (!group) return;
        group.traverse((o) => {
          if (o.isMesh) {
            o.geometry?.dispose();
            if (Array.isArray(o.material)) {
              o.material.forEach((m) => m.dispose());
            } else {
              o.material?.dispose();
            }
          }
        });
      }

      function buildKaiju() {
        disposeKaiju();

        const group = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({
          color: 0x3a4a3e,
          roughness: 0.8,
          metalness: 0.1,
          emissive: new THREE.Color(0x1f3525).multiplyScalar(0.45),
          emissiveIntensity: 1.0,
        });

        const torso = new THREE.Mesh(
          new THREE.BoxGeometry(3, 4, 2),
          bodyMat,
        );
        torso.position.y = 4;
        torso.castShadow = true;
        group.add(torso);

        const head = new THREE.Mesh(
          new THREE.BoxGeometry(1.8, 1.4, 1.8),
          bodyMat,
        );
        head.position.set(0, 6.8, 0.5);
        head.castShadow = true;
        group.add(head);

        // Eyes
        const eyeMat = new THREE.MeshStandardMaterial({
          color: 0xffcc66,
          emissive: new THREE.Color(0xffcc66),
          emissiveIntensity: 1.2,
          roughness: 0.3,
        });
        const eyeGeom = new THREE.SphereGeometry(0.18, 10, 10);
        [-0.4, 0.4].forEach((x) => {
          const eye = new THREE.Mesh(eyeGeom, eyeMat);
          eye.position.set(x, 6.9, 1.45);
          group.add(eye);
        });

        // Legs
        const legGeom = new THREE.CylinderGeometry(0.6, 0.6, 3, 14);
        [-0.9, 0.9].forEach((x) => {
          const leg = new THREE.Mesh(legGeom, bodyMat);
          leg.position.set(x, 1.5, 0);
          leg.castShadow = true;
          group.add(leg);
        });

        // Arms
        const armGeom = new THREE.CylinderGeometry(0.35, 0.35, 2, 12);
        [-1.9, 1.9].forEach((x) => {
          const arm = new THREE.Mesh(armGeom, bodyMat);
          arm.position.set(x, 4.3, 0.3);
          arm.rotation.z = x < 0 ? Math.PI / 6 : -Math.PI / 6;
          arm.rotation.x = -Math.PI / 6;
          arm.castShadow = true;
          group.add(arm);
        });

        // Tail — 5 tapering boxes
        const tail = new THREE.Group();
        let tailZ = -1;
        let tailY = 3.2;
        let tailW = 1.2;
        let tailH = 1.0;
        for (let i = 0; i < 5; i++) {
          const seg = new THREE.Mesh(
            new THREE.BoxGeometry(tailW, tailH, 1.0),
            bodyMat,
          );
          tailZ -= 0.9;
          tailY -= 0.2;
          seg.position.set(0, tailY, tailZ);
          seg.rotation.x = -0.22;
          tail.add(seg);
          tailW *= 0.78;
          tailH *= 0.82;
        }
        group.add(tail);

        // Back fins — simple planes
        const finMat = new THREE.MeshStandardMaterial({
          color: 0x2a382e,
          roughness: 0.7,
          metalness: 0.1,
          emissive: new THREE.Color(0x12281c),
          emissiveIntensity: 0.6,
          side: THREE.DoubleSide,
        });
        for (let i = 0; i < 4; i++) {
          const finShape = new THREE.Shape();
          finShape.moveTo(-0.4, 0);
          finShape.lineTo(0.4, 0);
          finShape.lineTo(0, 0.8);
          finShape.lineTo(-0.4, 0);
          const finGeom = new THREE.ShapeGeometry(finShape);
          const fin = new THREE.Mesh(finGeom, finMat);
          fin.rotation.y = Math.PI / 2;
          fin.position.set(0, 6 - i * 0.4, 0.2 - i * 0.8);
          group.add(fin);
        }

        // Scale so kaiju ≈ 1.5 × tallest building
        const maxBuildingH = config.maxHeight;
        const desired = maxBuildingH * 1.5;
        const currentH = 8; // torso top ≈ 6, head top ≈ 8
        const s = desired / currentH;
        group.scale.setScalar(s);

        // Start at map edge, walking toward center
        kaijuState.pos.set(-halfMap + 4, 0, 0);
        kaijuState.dir.set(1, 0, 0);
        kaijuState.time = 0;
        group.position.copy(kaijuState.pos);

        scene.add(group);
        kaiju = group;
        kaiju.userData.bodyMat = bodyMat;
        kaiju.userData.finMat = finMat;
      }

      function disposeKaiju() {
        if (kaiju) {
          scene.remove(kaiju);
          disposeGroup(kaiju);
          kaiju = null;
        }
      }

      function startCrushBuilding(buildingMesh) {
        if (buildingMesh.userData.crushing) return;
        buildingMesh.userData.crushing = true;
        buildingMesh.userData.crushT = 0;
        kaijuState.dyingBuildings.push(buildingMesh);
      }

      function spawnDust(position) {
        const count = 40;
        const positions = new Float32Array(count * 3);
        const velocities = [];
        for (let i = 0; i < count; i++) {
          positions[i * 3] = position.x + (Math.random() - 0.5) * 2;
          positions[i * 3 + 1] = 0.1 + Math.random() * 0.3;
          positions[i * 3 + 2] = position.z + (Math.random() - 0.5) * 2;
          velocities.push(
            new THREE.Vector3(
              (Math.random() - 0.5) * 1.2,
              0.5 + Math.random() * 1.2,
              (Math.random() - 0.5) * 1.2,
            ),
          );
        }
        const geom = new THREE.BufferGeometry();
        geom.setAttribute(
          "position",
          new THREE.BufferAttribute(positions, 3),
        );
        const mat = new THREE.PointsMaterial({
          color: 0xa0a0a0,
          size: 0.35,
          transparent: true,
          opacity: 0.8,
          sizeAttenuation: true,
          depthWrite: false,
        });
        const points = new THREE.Points(geom, mat);
        scene.add(points);
        kaijuState.dusts.push({ points, velocities, life: 0 });
      }

      function updateKaiju(delta) {
        // Sky color lerp toward red when active
        const target = kaijuState.active ? 1 : 0;
        kaijuState.skyLerp +=
          (target - kaijuState.skyLerp) * Math.min(delta * 1.4, 1);

        if (config.mood === "night") {
          const t = kaijuState.skyLerp;
          const top = kaijuSkyNight.uTop
            .clone()
            .lerp(kaijuSkyRed.uTop, t);
          const mid = kaijuSkyNight.uMid
            .clone()
            .lerp(kaijuSkyRed.uMid, t);
          const hor = kaijuSkyNight.uHorizon
            .clone()
            .lerp(kaijuSkyRed.uHorizon, t);
          skyMat.uniforms.uTop.value.copy(top);
          skyMat.uniforms.uMid.value.copy(mid);
          skyMat.uniforms.uHorizon.value.copy(hor);

          const bg = kaijuSkyNight.bg.clone().lerp(kaijuSkyRed.bg, t);
          scene.background = bg;
          scene.fog.color.copy(bg);
        }

        // Update existing dust particles regardless of active state
        kaijuState.dusts = kaijuState.dusts.filter((d) => {
          d.life += delta;
          const posAttr = d.points.geometry.attributes.position;
          for (let i = 0; i < d.velocities.length; i++) {
            posAttr.array[i * 3] += d.velocities[i].x * delta;
            posAttr.array[i * 3 + 1] += d.velocities[i].y * delta;
            posAttr.array[i * 3 + 2] += d.velocities[i].z * delta;
            d.velocities[i].y -= delta * 0.8;
          }
          posAttr.needsUpdate = true;
          d.points.material.opacity = Math.max(0, 0.8 - d.life * 0.8);
          if (d.life >= 1.0) {
            scene.remove(d.points);
            d.points.geometry.dispose();
            d.points.material.dispose();
            return false;
          }
          return true;
        });

        // Advance crushing buildings
        kaijuState.dyingBuildings = kaijuState.dyingBuildings.filter(
          (b) => {
            if (!b.parent) return false;
            b.userData.crushT += delta / 1.2;
            const t = Math.min(1, b.userData.crushT);
            b.scale.y = Math.max(0.0001, (1 - t) * b.userData.origScaleY);
            const shakeX = Math.sin(performance.now() * 0.04) * 0.15;
            const shakeZ = Math.cos(performance.now() * 0.04) * 0.15;
            b.position.y =
              (b.userData.origHeight * (1 - t)) / 2 +
              Math.sin(performance.now() * 0.03) * 0.05;
            b.position.x = b.userData.origX + shakeX;
            b.position.z = b.userData.origZ + shakeZ;

            // Sync windows with the collapsing building (position only;
            // opacity is left to the shared mood-driven material).
            if (b.userData.windows && b.userData.windows.length) {
              const collapseRatio = 1 - t;
              b.userData.windows.forEach((win) => {
                if (win.userData.origY === undefined) {
                  win.userData.origY = win.position.y;
                  win.userData.origX = win.position.x;
                  win.userData.origZ = win.position.z;
                }
                win.position.x = win.userData.origX + shakeX;
                win.position.z = win.userData.origZ + shakeZ;
                win.position.y = win.userData.origY * collapseRatio;
                win.visible = t < 0.98;
              });
            }

            if (t >= 1) {
              spawnDust(
                new THREE.Vector3(
                  b.userData.origX,
                  0,
                  b.userData.origZ,
                ),
              );
              // Remove windows of this building
              if (b.userData.windows) {
                b.userData.windows.forEach((win) => {
                  if (win.parent) win.parent.remove(win);
                });
                if (windowsMesh?.instances) {
                  windowsMesh.instances = windowsMesh.instances.filter(
                    (w) => !b.userData.windows.includes(w),
                  );
                }
              }
              b.parent.remove(b);
              b.geometry?.dispose();
              if (Array.isArray(b.material)) {
                b.material.forEach((m) => m.dispose());
              } else {
                b.material?.dispose();
              }
              return false;
            }
            return true;
          },
        );

        if (!kaijuState.active || !kaiju) return;

        kaijuState.time += delta;

        // Walk along current direction
        const speed = 2.0;
        kaijuState.pos.addScaledVector(kaijuState.dir, speed * delta);

        // Simple logic: when reaching center or wandering too far, turn.
        if (kaijuState.pos.length() < 1) {
          const choices = [
            new THREE.Vector3(1, 0, 0),
            new THREE.Vector3(-1, 0, 0),
            new THREE.Vector3(0, 0, 1),
            new THREE.Vector3(0, 0, -1),
          ];
          kaijuState.dir.copy(
            choices[Math.floor(Math.random() * choices.length)],
          );
        }
        if (
          Math.abs(kaijuState.pos.x) > halfMap - 2 ||
          Math.abs(kaijuState.pos.z) > halfMap - 2
        ) {
          kaijuState.dir.multiplyScalar(-1);
        }

        // Walk bob + sway
        const bob = Math.sin(kaijuState.time * 4) * 0.15;
        const sway = Math.sin(kaijuState.time * 2) * 0.05;
        kaiju.position.set(
          kaijuState.pos.x,
          bob,
          kaijuState.pos.z,
        );
        kaiju.rotation.y = Math.atan2(kaijuState.dir.x, kaijuState.dir.z);
        kaiju.rotation.z = sway;

        // Check for buildings within crush radius
        if (city) {
          const crushR = 5 * kaiju.scale.x * 0.2 + 5;
          const pos2 = new THREE.Vector3(
            kaijuState.pos.x,
            0,
            kaijuState.pos.z,
          );
          city.children.forEach((child) => {
            if (!child.userData.isBuilding) return;
            if (child.userData.crushing) return;
            const dx = child.position.x - pos2.x;
            const dz = child.position.z - pos2.z;
            const d = Math.sqrt(dx * dx + dz * dz);
            if (d < crushR) {
              child.userData.origScaleY = child.scale.y;
              child.userData.origHeight = child.scale.y;
              child.userData.origX = child.position.x;
              child.userData.origZ = child.position.z;
              startCrushBuilding(child);
            }
          });
        }
      }

      function setKaijuActive(active) {
        kaijuState.active = active;
        if (active) {
          buildKaiju();
        } else {
          disposeKaiju();
        }
      }

      buildCity();
      buildTraffic();
      buildCrossings();
      buildPedestrians();
      applyMood();
      applyTrafficMood();
      applyPedestriansMood();

      const clock = new THREE.Clock();

      function render() {
        const delta = Math.min(clock.getDelta(), 0.1);
        controls.update();
        updateTraffic(delta);
        updatePedestrians(delta);
        updateKaiju(delta);
        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }
      render();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      function resetKaiju() {
        setKaijuActive(false);
        kaijuState.dyingBuildings.length = 0;
        document.querySelectorAll("[data-kaiju]").forEach((b) => {
          b.classList.toggle("active", b.dataset.kaiju === "off");
        });
      }

      const countEl = document.getElementById("buildings");
      const countLabel = document.getElementById("buildingsLabel");
      countEl.addEventListener("input", () => {
        config.count = parseInt(countEl.value);
        countLabel.textContent = countEl.value;
        resetKaiju();
        buildCity();
        applyMood();
      });

      const heightEl = document.getElementById("height");
      const heightLabel = document.getElementById("heightLabel");
      heightEl.addEventListener("input", () => {
        config.maxHeight = parseFloat(heightEl.value);
        heightLabel.textContent = heightEl.value;
        resetKaiju();
        buildCity();
        applyMood();
      });

      const densityEl = document.getElementById("density");
      const densityLabel = document.getElementById("densityLabel");
      densityEl.addEventListener("input", () => {
        config.density = parseFloat(densityEl.value);
        densityLabel.textContent = parseFloat(densityEl.value).toFixed(2);
        resetKaiju();
        buildCity();
        applyMood();
      });

      document.querySelectorAll("[data-mood]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("[data-mood]")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          config.mood = btn.dataset.mood;
          buildCity();
          applyMood();
        });
      });

      document.querySelectorAll(".swatch").forEach((sw) => {
        sw.addEventListener("click", () => {
          document
            .querySelectorAll(".swatch")
            .forEach((s) => s.classList.remove("active"));
          sw.classList.add("active");
          config.accent = new THREE.Color(sw.dataset.accent);
          if (windowsMesh) {
            windowsMesh.material.color.copy(config.accent);
          }
        });
      });

      document.querySelectorAll("[data-kaiju]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("[data-kaiju]")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          setKaijuActive(btn.dataset.kaiju === "on");
        });
      });
    </script>
  </body>
</html>
